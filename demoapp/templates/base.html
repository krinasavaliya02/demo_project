<!DOCTYPE html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.datatables.net/2.3.1/css/dataTables.dataTables.min.css">

  
    <title>{% block title %} {% endblock %}</title>
    <style>{% block style %} {% endblock %}</style>
  </head>

  <body>

    {% if request.user.is_authenticated %}

      <nav class="navbar navbar-expand-sm navbar-dark bg-dark px-4">
          <a class="navbar-brand" href="{% url 'dashboard' %}">Demo</a>

          <div class="d-flex justify-content-end w-100">
              <span class="text-white d-flex align-items-center px-4">
                  Welcome, {{ request.user.username }}
              </span>

              <div class="dropdown">
                <button type="button" class="btn btn-light btn-sm dropdown-toggle" data-bs-toggle="dropdown">
                  My Account
                </button>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="#" data-bs-toggle="modal" data-bs-target="#editProfileModel"> <i class="fa-solid fa-circle-user me-2"></i>Edit Profile</a></li>
                  <li><hr class="dropdown-divider"></li>
                  <li><a class="dropdown-item" href="#" data-bs-toggle="modal" data-bs-target="#passwordModel"> <i class="fa-solid fa-key me-2"></i>Change Password</a></li>
                </ul>
              </div>

              <a href="{% url 'companies:logout' %}" class="btn btn-light btn-sm ms-2">
                <i class="fa-solid fa-right-to-bracket me-1"></i>
                  Logout
              </a>
          </div>
      </nav>

    {% endif %} 
    
    {% block content %}
    {% endblock %}

    {% include 'companies/modals.html' %}  

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdn.datatables.net/2.3.1/js/dataTables.min.js"></script>

    <script src="{% static 'js/company.js' %}"></script>
    <script src="{% static 'js/auth.js' %}"></script>
    <script src="{% static 'js/dashboard.js' %}"></script>
    <script src="{% static 'js/edit_profile.js' %}"></script>
    <script src="{% static 'js/change_password.js' %}"></script>

  </body>
</html>
