<!DOCTYPE html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.datatables.net/2.3.1/css/dataTables.dataTables.min.css">

  
    <title>{% block title %} {% endblock %}</title>
    <style>{% block style %} {% endblock %}</style>
  </head>

  <body>

    {% if request.user.is_authenticated %}

      <nav class="navbar navbar-expand-sm navbar-dark bg-dark px-4">
          <a class="navbar-brand" href="{% url 'dashboard' %}">Demo</a>

          <div class="d-flex justify-content-end w-100">
              <span class="text-white d-flex align-items-center px-4">
                  Welcome, {{ request.user.username }}
              </span>

              <a href="{% url 'companies:logout' %}" class="btn btn-light">
                  Logout
              </a>
          </div>
      </nav>

    {% endif %}
    
    {% block content %}
    {% endblock %}


  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdn.datatables.net/2.3.1/js/dataTables.min.js"></script>

    <script src="{% static 'js/company.js' %}"></script>
    <script src="{% static 'js/auth.js' %}"></script>
    <script src="{% static 'js/dashboard.js' %}"></script>
  </body>
</html>
