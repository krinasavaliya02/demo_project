{% extends 'base.html' %}

{% block title %} Dashboard Page {% endblock %}

{% block style %}
    .card{
      background-color : lightgrey;
    }
{% endblock %}

{% block content %}

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2>Dashboard</h2>
        </div>
    </div>

    <div class="col-sm-3">
        <div class="card shadow-sm border-1 rounded-4">
            <div class="card-body">
                <a href="{% url 'companies:list_page' %}" class="text-decoration-none text-dark">
                    <div class="d-flex align-items-center gap-3">
                        <i class="fa-solid fa-building fs-4"></i>
                        <h5 class="card-title mb-0">Total Companies</h5>
                    </div>
                    <h1 class="fw-bold mt-3" id="countCompany">0</h1>
                </a>
            </div>
        </div>    
    </div>
</div>

{% endblock %}
