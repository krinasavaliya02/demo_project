<div id="message"></div>

<input type="hidden" id="company_id" value="{{ company.id }}">

<div class="form-check form-switch d-flex justify-content-end">
    <input class="form-check-input fs-4" type="checkbox" id="statusSwitch" name="is_active" {% if company.is_active %}checked{% endif %} />
</div>

<div class="row mt-3">
    <div class="col-sm-6">
        <label>Company Name:</label>
        <input type="text" id="company_name" name="name" value="{{ company.name }}" class="form-control mt-1" placeholder="Enter company name" />
        <p class="error"></p>
    </div>

    <div class="col-sm-6">
        <label>Email:</label>
        <input type="text" id="email" name="email" value="{{ company.email }}" class="form-control mt-1" placeholder="Enter email address" />
        <p class="error"></p>
    </div>
</div>

<div class="row mt-1">
    <div class="col-sm-6">
        <label>Phone No:</label>
        <input type="text" id="phone" name="phone" value="{{ company.phone }}" class="form-control mt-1" placeholder="Enter phone number" />
        <p class="error"></p>
    </div>

    <div class="col-sm-6">
        <label>Address:</label>
        <input type="text" id="address" name="address" value="{{ company.address }}" class="form-control mt-1" placeholder="Enter address" />
        <p class="error"></p>
    </div>
</div>

<!-- project details -->

<h4 class="text-center mt-5 mb-4">Project Details</h4>
<div id='project_container'>
{% if company.projects.all %}
    {% for project in company.projects.all %}
        {% include 'companies/project-section.html' %}
    {% endfor %}
{% else %}
    {% include 'companies/project-section.html' %}
{% endif %}
</div>

<div class="text-start mt-3">
<button type="button" class="btn btn-outline-success btn-sm add-project-btn"><i class="fa-solid fa-plus"></i> Add Project</button>
</div>

<div class="row mt-4">
<div class="pt-2 text-center">
    <button type="submit" class="btn btn-primary px-4">Save</button>
    <a href="{% url 'companies:list_page' %}" class="btn btn-secondary px-4">Cancel</a>
</div>
</div>
