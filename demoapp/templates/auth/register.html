{% extends 'base.html' %}

{% block title %} Register Page {% endblock %}

{% block style %}
    #message{
      position: fixed;
      top: 20px;
      right: 12px;
      width: 300px;
    }
{% endblock %}

{% block content %}
<div class="container">
  <div class="row justify-content-center align-items-center vh-100">
    <div class="col-sm-4 bg-light p-4 rounded-3 shadow">

      <form method="post" id="register_form">
        {% csrf_token %}
        <h3 class="text-center mb-4">Register</h3>

        <div id="message"></div>

        <div class="mb-3">
          <label class="form-label">Username:</label>
          <input type="text" id='username' name="username" class="form-control" placeholder="Enter username">
          <p class="error"></p>
        </div>

        <div class="mb-3">
          <label class="form-label">Email:</label>
          <input type="text" id='email' name="email" class="form-control" placeholder="Enter email">
          <p class="error"></p>
        </div>

        <div class="mb-3">
          <label class="form-label">Password:</label>
          <input type="password" id='password' name="password" class="form-control" placeholder="Enter password">
          <p class="error"></p>
        </div>

        <div class="mb-3">
          <label class="form-label">Confirm Password:</label>
          <input type="password" id='confirmpassword' name="confirmpassword" class="form-control" placeholder="Enter confirm password">
          <p class="error"></p>
        </div>

        <button type="submit" id='register_btn' class="btn btn-primary w-100">Register</button>

        <p class="text-center mt-3 mb-0">
            Already have an account? <a href="{% url 'login' %}" class="text-decoration-none">Login</a>
        </p>
      </form>

    </div>
  </div>
</div>
{% endblock %}
